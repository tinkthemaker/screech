name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for target in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="screech-${version}-${os}-${arch}"
            mkdir -p "tmp/${name}"
            output="tmp/${name}/screech"
            if [ "$os" = windows ]; then output="${output}.exe"; fi
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=${version}" \
              -o "$output" ./cmd/screech
            cp README.md "tmp/${name}/"
            if [ "$os" = windows ]; then
              (cd tmp && zip -qr "../release/${name}.zip" "$name")
            else
              tar -C tmp -czf "release/${name}.tar.gz" "$name"
            fi
          done
          (cd release && sha256sum * > SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: screech-release
          path: release/*
          if-no-files-found: error
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag
